<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — BAR</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: #1e293b;
            letter-spacing: -0.02em;
        }

        .login-logo h1 span { color: #2563eb; }

        .login-logo p {
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        .campo {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
            color: #374151;
        }

        input {
            width: 100%;
            padding: 0.6rem 0.85rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: border-color 0.15s;
            outline: none;
        }

        input:focus { border-color: #2563eb; }

        .btn-submit {
            width: 100%;
            padding: 0.65rem;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.15s;
        }

        .btn-submit:hover { background: #1d4ed8; }

        .mensajes { margin-bottom: 1rem; }
        .mensaje {
            padding: 0.65rem 0.9rem;
            border-radius: 6px;
            font-size: 0.85rem;
        }
        .mensaje.error { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-logo">
        <h1>SGI<span>BAR</span></h1>
        <p>Sistema de gestión de inventario para bar</p>
    </div>

    {% if messages %}
    <div class="mensajes">
        {% for msg in messages %}
        <div class="mensaje {{ msg.tags }}">{{ msg }}</div>
        {% endfor %}
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="campo">
            <label for="username">Usuario</label>
            <input type="text" id="username" name="username" autofocus autocomplete="username" required>
        </div>
        <div class="campo">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-submit">Ingresar</button>
    </form>
</div>

</body>
</html>
